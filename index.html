<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  text-align: center;
  background: #ffd6e0;
  color: #ff4d6d;
  overflow: hidden;
}

.page {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
.active { display: flex; }

button {
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: #ff4d6d;
  color: white;
  font-size: 16px;
  cursor: pointer;
  margin-top: 20px;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
}

/* FIXED BUTTON POSITION */
#msgBtn {
  position: absolute;
  top: 120px;
  left: 50%;
  transform: translateX(-50%);
  display: none;
  z-index: 10;
}

#page5 { position: relative; }

/* glow */
.glow { animation: glow 1s infinite alternate; }
@keyframes glow {
  from { text-shadow: 0 0 5px #fff; }
  to { text-shadow: 0 0 20px #ff4d6d; }
}

/* sparkle */
.sparkle {
  position: fixed;
  font-size: 10px;
  animation: sparkle 1s linear forwards;
}
@keyframes sparkle {
  to { transform: translateY(-50px); opacity: 0; }
}

/* hearts */
.heart-burst {
  position: fixed;
  font-size: 20px;
  animation: explode 1s ease-out forwards;
}
@keyframes explode {
  from { transform: scale(1); opacity:1; }
  to { transform: scale(2) translate(var(--x), var(--y)); opacity:0; }
}

/* falling magic */
.fall {
  position: fixed;
  top: -20px;
  font-size: 20px;
  animation: fall linear forwards;
  pointer-events: none;
}
@keyframes fall {
  to { transform: translateY(110vh); opacity: 0; }
}

/* cursor */
.cursor::after {
  content: "|";
  animation: blink 1s infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* layout */
#messageRow {
  display: flex;
  gap: 15px;
  justify-content: center;
  align-items: flex-start;
  flex-direction: column;
}

/* boxes */
.box {
  display: none;
  background: rgba(255,255,255,0.85);
  border: 2px solid #ff8fa3;
  border-radius: 20px;
  padding: 18px;
  width: 90%;
  max-width: 280px;
  box-shadow: 0 0 20px rgba(255,105,135,0.4);
  text-align: center;
}

#messageBox { text-align: center; }

#whoMessage {
  text-align: left;
  font-size: 14px;
}

/* Who am I button */
#whoBtn {
  display: none;      
  margin-top: 15px;  
  padding: 10px 20px;
  border-radius: 20px;
  background: #ff4d6d;
  color: white;
  border: none;
  cursor: pointer;
}

/* PAGE 3 TEXT ANIMATION */
.reveal-text {
  opacity: 0;
  transform: translateY(40px) scale(0.95);
  animation: revealText 1.5s ease forwards;
}
.reveal-text.delay {
  animation-delay: 0.8s;
}
@keyframes revealText {
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* keep visible */
#mainText, #secondText {
  opacity: 1 !important;
}

/* fade */
.fade-out {
  animation: fadeOut 1s forwards;
}
@keyframes fadeOut {
  to { opacity: 0; transform: translateY(-30px); }
}

/* suspense */
#suspenseDots {
  display: none;
  font-size: 28px;
  margin-top: 10px;
  animation: blinkDots 1s infinite;
}
@keyframes blinkDots {
  0%,100% { opacity: 0.2; }
  50% { opacity: 1; }
}

/* heartbeat */
.heartbeat {
  animation: heartbeatAnim 1s infinite;
}
@keyframes heartbeatAnim {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

/* button */
.delayed-btn {
  display: none;
  opacity: 0;
}
.show-btn {
  display: inline-block;
  animation: showButton 0.8s ease forwards;
}
@keyframes showButton {
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <h1>Enter Password 💌</h1>
  <input type="password" id="pass" placeholder="Enter password">
  <p>Hint: Your cute nickname 😉</p>
  <p id="liveHint"></p>
  <button onclick="checkPass()">Unlock</button>
  <p id="errorMsg"></p>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
  <h1 id="loadingText" class="cursor"></h1>
  <p>Just a moment 💖</p>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
  <h1 id="mainText" class="reveal-text" style="font-weight:bold;">
    My girl was born 20 years ago today!
  </h1>

  <p id="secondText" class="reveal-text delay">
    Yes, it’s YOU! A little surprise awaits... 💖
  </p>

  <div id="suspenseDots">...</div>

  <button id="startBtn" onclick="startSurprise()" class="delayed-btn">
    🎁 Start the Surprise
  </button>
</div>

<!-- PAGE 4 -->
<div class="page" id="page4">
  <h1>Click Cake 🎂</h1>
  <div style="font-size:80px; cursor:pointer;" onclick="cutCake()">🎂</div>
  <p id="cakeText">Tap cake to celebrate!</p>
</div>

<!-- PAGE 5 -->
<div class="page" id="page5">
  <h1>Happy Birthday Krithika ❤️</h1>

  <div id="messageRow">
    <div id="messageBox" class="box">
      <p id="typedMessage" class="cursor"></p>
    </div>

    <div id="whoMessage" class="box">
      <p id="typedWhoMessage" class="cursor"></p>
    </div>

    <!-- Who am I button below message box -->
    <button id="whoBtn" onclick="askWho()">Who am I</button>
  </div>

  <button id="msgBtn" onclick="showMessage()">📧 Open my message</button>

  <div id="whoPassBox" class="box">
    <input type="password" id="whoPass" placeholder="Enter password">
    <button onclick="checkWho()">Unlock</button>
    <p id="whoError"></p>
  </div>
</div>

<script>
let correctPassword="kittu";

/* hint */
pass.addEventListener("input", function () {
  let value=this.value.toLowerCase();
  let display="";
  for(let i=0;i<correctPassword.length;i++){
    display+=(value[i]===correctPassword[i])?correctPassword[i]+" ":"_ ";
  }
  liveHint.innerText=display;
});

/* password */
function checkPass(){
  if(pass.value===correctPassword){
    nextPage(2);
    typeEffect();
  } else {
    errorMsg.innerText="Wrong 😜";
  }
}

/* FAST loading */
let text="Loading your bday surprise...";
let index=0;
function typeEffect(){
  if(index<text.length){
    loadingText.innerHTML+=text[index++];
    setTimeout(typeEffect,40);
  } else {
    setTimeout(()=>nextPage(3),700);
  }
}

/* Page 3 */
function showStartButton(){
  setTimeout(()=> {
    suspenseDots.style.display="block";
    mainText.classList.add("heartbeat");

    setTimeout(()=> {
      suspenseDots.style.display="none";
      startBtn.classList.add("show-btn");
    },2000);

  },3000);
}

/* FIXED glitch */
function startSurprise(){
  mainText.classList.remove("heartbeat");
  startBtn.style.display="none";
  suspenseDots.style.display="none";

  mainText.classList.add("fade-out");
  secondText.classList.add("fade-out");

  setTimeout(()=>nextPage(4),1000);
}

/* page switch */
function nextPage(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById("page"+p).classList.add("active");

  if(p===3) showStartButton();

  if(p===5){
    startMagic();
    setTimeout(()=>msgBtn.style.display="block",4000);
  }
}

/* cake */
function cutCake(){
  cakeText.innerHTML="Happy Birthday Krithika ❤️";
  nextPage(5);
}

/* magic */
let magicInterval; // store interval globally
function startMagic(){
  magicInterval = setInterval(()=> {
    let el=document.createElement("div");
    el.className="fall";
    let items=["🌻","⭐","❤️","✨"];
    el.innerHTML=items[Math.floor(Math.random()*items.length)];
    el.style.left=Math.random()*100+"vw";
    el.style.fontSize=(15+Math.random()*20)+"px";
    el.style.animationDuration=(3+Math.random()*3)+"s";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),6000);
  },300);
}

/* hearts */
function heartExplosion(){
  for(let i=0;i<25;i++){
    let h=document.createElement("div");
    h.className="heart-burst";
    h.innerHTML="❤️";
    h.style.left="50%";
    h.style.top="50%";
    h.style.setProperty('--x',(Math.random()-0.5)*400+"px");
    h.style.setProperty('--y',(Math.random()-0.5)*400+"px");
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1000);
  }
}

/* message */
let msg=`Happy Birthday, Kirithika ❤️🎂

This might be a little random, but I couldn’t miss the chance to wish you.

Hope your day is full of happiness… and maybe this message made you smile a little ❤️😄`;

let iMsg=0;
function typeMessage(){
  if(iMsg<msg.length){
    typedMessage.innerHTML+=msg[iMsg]==="\n"?"<br>":msg[iMsg];
    iMsg++;
    setTimeout(typeMessage,40);
  } else {
    // stop falling items once message completes
    clearInterval(magicInterval);
    setTimeout(()=>whoBtn.style.display="block",3000);
  }
}

let whoMsg=`Heyy Kittu 😊

Innikki romba special day… because it’s your birthday 🥳✨

Naan unna innum face to face paakala… but honestly, innikku konjam different-a feel aayiduchu.
Naan silent-a irundhu, un voice kekka chance kidaichiduchu… and you didn’t even know I was there 🤭

Aana seriyaa sollanum na… un voice kekkum pothu dhaan therinjiduchu — you’re really something special 😌❤️

Just listening to you talk made me smile… so imagine, neraya pesina enna aagumo 😄

Un life full-a happiness, success, and lots of cute moments irukanum…
and hopefully, adhul konjam naanum irukanum 🤭💖

Happy Birthday 🎂✨
Have an amazing day! 💖🥰`;

let wIndex=0;
function typeWhoMessage(){
  if(wIndex<whoMsg.length){
    typedWhoMessage.innerHTML+=whoMsg[wIndex];
    wIndex++;
    setTimeout(typeWhoMessage,45);
  }
}

function showMessage(){
  msgBtn.style.display="none";
  messageBox.style.display="block";
  typeMessage();
  heartExplosion();
}

function askWho(){
  whoPassBox.style.display="block";
}

function checkWho(){
  if(whoPass.value==="happybirthday"){
    whoPassBox.style.display="none";
    whoMessage.style.display="block";
    typeWhoMessage();
    heartExplosion();
  } else {
    whoError.innerText="Wrong 😜";
  }
}
</script>

</body>
</html>
